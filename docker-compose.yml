services:
  postgres:
    image: postgres:16-alpine
    container_name: wayline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wayline
      POSTGRES_PASSWORD: wayline
      POSTGRES_DB: wayline
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayline -d wayline"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wayline-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
